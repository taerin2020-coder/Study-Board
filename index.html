<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Study Board">
  <meta name="theme-color" content="#f3eadb">
  <title>Study Board</title>
  <style>
    :root {
      --bg: #f3eadb;
      --theme-bg: #f3eadb;
      --theme-bg-strong: #eadbc3;
      --theme-ink: #315d49;
      --paper: #fffaf1;
      --paper-2: #fff4df;
      --ink: #2f2a24;
      --muted: #7a6d5f;
      --line: #e2d2bb;
      --accent: #5f8d75;
      --accent-dark: #315d49;
      --misc: #d6d1c7;
      --shadow: 0 16px 40px rgba(67, 49, 28, 0.12);
      --small-shadow: 0 8px 20px rgba(67, 49, 28, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100svh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 8%, color-mix(in srgb, var(--theme-bg-strong) 38%, transparent) 0 18%, transparent 42%),
        linear-gradient(rgba(120, 95, 62, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 95, 62, 0.04) 1px, transparent 1px),
        color-mix(in srgb, var(--bg) 58%, var(--theme-bg) 42%);
      background-size: auto, 32px 32px, 32px 32px, auto;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 14px clamp(14px, 3vw, 24px) 24px;
    }

    .decor-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: grid;
      grid-template-columns: repeat(8, minmax(62px, 1fr));
      gap: clamp(12px, 3.2vw, 38px);
      padding: 58px clamp(14px, 4vw, 54px);
      overflow: hidden;
      pointer-events: none;
      opacity: 0.28;
      -webkit-mask-image: linear-gradient(to bottom, #000 0%, rgba(0, 0, 0, 0.82) 40%, rgba(0, 0, 0, 0.18) 100%);
      mask-image: linear-gradient(to bottom, #000 0%, rgba(0, 0, 0, 0.82) 40%, rgba(0, 0, 0, 0.18) 100%);
    }

    .decor-layer span {
      display: inline-grid;
      place-items: center;
      min-height: 58px;
      color: color-mix(in srgb, var(--theme-ink) 48%, transparent);
      filter: saturate(0.82);
      font-size: clamp(24px, 4.6vw, 48px);
      transform: rotate(-10deg);
    }

    .decor-layer span:nth-child(3n) {
      transform: rotate(8deg) translateY(12px);
    }

    .decor-layer span:nth-child(4n) {
      opacity: 0.7;
      transform: rotate(-4deg) translateY(-10px);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0 10px;
      overflow: visible;
      background: color-mix(in srgb, var(--bg) 70%, var(--theme-bg) 30%);
      backdrop-filter: blur(14px);
    }

    .topbar::before {
      content: attr(data-emoji) "  " attr(data-emoji) "  " attr(data-emoji) "  " attr(data-emoji) "  " attr(data-emoji) "  " attr(data-emoji);
      position: absolute;
      inset: 4px 96px 4px 160px;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: space-around;
      overflow: hidden;
      color: color-mix(in srgb, var(--theme-ink) 42%, transparent);
      font-size: clamp(22px, 3vw, 34px);
      letter-spacing: 18px;
      opacity: 0.72;
      filter: saturate(0.75);
      transform: rotate(-3deg);
      pointer-events: none;
      white-space: nowrap;
    }

    .topbar > * {
      position: relative;
      z-index: 1;
    }

    .title-block {
      min-width: 0;
      flex: 1;
    }

    .eyebrow {
      margin-bottom: 4px;
      color: var(--accent-dark);
      font-size: 13px;
      font-weight: 800;
    }

    .title-line {
      display: grid;
      grid-template-columns: auto minmax(300px, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    h1 {
      font-size: clamp(25px, 3.2vw, 38px);
      line-height: 1.05;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .note-box {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 6px;
      align-items: stretch;
      min-width: 0;
    }

    .note-mode {
      min-height: 38px;
      font-size: 13px;
    }

    .note-input-wrap {
      position: relative;
      min-width: 0;
    }

    .note-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      color: var(--accent-dark);
      font-size: 18px;
      font-weight: 900;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .note-icon[hidden] {
      display: none;
    }

    .motivation {
      width: 100%;
      min-height: 38px;
      padding: 7px 11px;
      color: var(--ink);
      background: rgba(255, 253, 248, 0.78);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      outline: none;
      font-size: 16px;
    }

    .motivation.has-icon {
      padding-left: 35px;
    }

    .motivation:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(95, 141, 117, 0.14);
    }

    .top-theme {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 38px;
      padding: 0 10px;
      color: var(--ink);
      background: rgba(255, 253, 248, 0.78);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.82) inset;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .theme-toggle:hover,
    .theme-toggle.is-themed {
      background: color-mix(in srgb, #fffdf8 46%, var(--theme-bg) 54%);
      border-color: color-mix(in srgb, var(--theme-ink) 34%, var(--line));
    }

    .theme-toggle b {
      font-size: 18px;
      line-height: 1;
    }

    .emoji-popover {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(5, 38px);
      gap: 6px;
      padding: 8px;
      background: rgba(255, 250, 241, 0.98);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--small-shadow);
    }

    .emoji-choice {
      width: 38px;
      min-height: 38px;
      padding: 0;
      background: #fffdf8;
      border: 1px solid #eadbc5;
      border-radius: var(--radius);
      font-size: 20px;
    }

    .emoji-choice.active {
      background: #edf5ef;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(95, 141, 117, 0.14);
    }

    .actions,
    .mobile-tabs,
    .metrics,
    .panel-title,
    .periods,
    .subject-head,
    .task,
    .date-row,
    .theme-row,
    .daily-tools,
    .task-meta,
    .palette {
      display: flex;
      align-items: center;
    }

    .actions {
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .button,
    .primary,
    .danger,
    .mini,
    .tab,
    .period,
    .file-button,
    .theme-chip {
      min-height: 42px;
      padding: 0 14px;
      color: var(--ink);
      background: #fff7ea;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.82) inset;
      white-space: nowrap;
    }

    .button:active,
    .primary:active,
    .danger:active,
    .mini:active,
    .tab:active,
    .period:active,
    .file-button:active,
    .theme-chip:active,
    .swatch:active {
      transform: translateY(1px);
    }

    .primary {
      color: #fffdf8;
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 800;
    }

    .danger {
      color: #85372e;
      background: #fff1ea;
      border-color: #e5b9aa;
    }

    .mini {
      min-width: 38px;
      min-height: 36px;
      padding: 0 10px;
      color: var(--muted);
      background: transparent;
      box-shadow: none;
    }

    .tiny {
      min-height: 32px;
      padding: 0 9px;
      font-size: 12px;
    }

    .copy,
    .postpone {
      min-height: 36px;
      padding: 0 10px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .copy {
      color: var(--accent-dark);
      background: #edf5ef;
      border: 1px solid #c8ddcf;
    }

    .postpone {
      color: #6f4b15;
      background: #fff0d2;
      border: 1px solid #e6c783;
    }

    .file-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      min-width: 34px;
      min-height: 34px;
      padding: 0;
      border-radius: var(--radius);
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
      white-space: nowrap;
    }

    .mobile-tabs {
      display: none;
      gap: 8px;
      padding: 4px;
      margin-bottom: 12px;
      background: rgba(255, 250, 241, 0.82);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .tab {
      flex: 1;
      background: transparent;
      box-shadow: none;
      font-weight: 800;
    }

    .tab.active {
      color: #fffdf8;
      background: var(--accent);
      border-color: var(--accent);
    }

    .board {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(360px, 0.8fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      min-width: 0;
      padding: clamp(12px, 1.7vw, 16px);
      background: rgba(255, 250, 241, 0.94);
      border: 1px solid rgba(226, 210, 187, 0.94);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .today-panel {
      --theme-accent: var(--accent);
      --theme-soft: #fff4df;
      --theme-border: rgba(226, 210, 187, 0.94);
      position: sticky;
      top: 96px;
      max-height: calc(100svh - 116px);
      overflow: auto;
      background: var(--theme-soft);
      border-color: var(--theme-border);
    }

    .today-panel[data-theme="hard"] {
      --theme-accent: #d46a65;
      --theme-soft: #fff1ed;
      --theme-border: #e7bbb2;
    }

    .today-panel[data-theme="nice"] {
      --theme-accent: #cf9d3d;
      --theme-soft: #fff7dc;
      --theme-border: #e5cd8f;
    }

    .today-panel[data-theme="exam"] {
      --theme-accent: #6688bd;
      --theme-soft: #eef5ff;
      --theme-border: #bdd0e8;
    }

    .today-panel .fill,
    .today-panel .primary {
      background: var(--theme-accent);
      border-color: var(--theme-accent);
    }

    .panel-head {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .panel-title {
      justify-content: space-between;
      gap: 12px;
    }

    .panel-title h2 {
      font-size: clamp(21px, 2.4vw, 30px);
    }

    .today-heading {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .today-emoji {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius);
      font-size: 20px;
    }

    .quiet {
      color: var(--muted);
      font-size: 13px;
    }

    .remaining {
      display: inline-flex;
      align-items: center;
      margin-top: 4px;
      padding: 4px 8px;
      color: #fffdf8;
      background: var(--theme-accent);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
    }

    .metrics {
      gap: 8px;
      flex-wrap: wrap;
    }

    .metric {
      flex: 1 1 190px;
      min-width: 0;
      padding: 9px 10px;
      background: var(--paper-2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--small-shadow);
    }

    .today-panel .metric {
      background: rgba(255, 253, 248, 0.74);
      border-color: var(--theme-border);
    }

    .metric strong {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .metric-line {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .percent {
      color: var(--ink);
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }

    .bar {
      position: relative;
      height: 7px;
      margin-top: 7px;
      overflow: hidden;
      background: #ecdec9;
      border-radius: 999px;
    }

    .fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--p, 0%);
      background: var(--accent);
      border-radius: inherit;
    }

    .form-line {
      display: grid;
      grid-template-columns: minmax(130px, 1fr) minmax(120px, 0.7fr) auto;
      gap: 7px;
      align-items: center;
    }

    .mini-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 7px;
      margin-top: 9px;
    }

    .daily-add {
      grid-template-columns: minmax(0, 1fr) minmax(150px, 190px) auto;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      color: var(--ink);
      background: #fffdf8;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      outline: none;
      font-size: 16px;
    }

    .select {
      appearance: none;
      padding-right: 28px;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--muted) 50%),
        linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position:
        calc(100% - 16px) 18px,
        calc(100% - 11px) 18px;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }

    .textarea {
      display: block;
      min-height: 38px;
      max-height: 160px;
      overflow: hidden;
      resize: none;
      line-height: 1.35;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(95, 141, 117, 0.14);
    }

    .periods {
      gap: 7px;
      padding: 2px 0 6px;
      margin: 2px 0 9px;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .period {
      min-width: 154px;
      padding: 8px 10px;
      text-align: left;
      background: #fffaf1;
    }

    .period.active {
      color: #fffdf8;
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    .period b,
    .period span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .period span {
      margin-top: 3px;
      opacity: 0.76;
      font-size: 12px;
    }

    .period-edit {
      display: grid;
      grid-template-columns: minmax(140px, 0.8fr) minmax(180px, 1fr) auto;
      gap: 8px;
      align-items: end;
      padding: 10px;
      margin-bottom: 10px;
      background: rgba(255, 246, 230, 0.75);
      border: 1px dashed #d9c7ac;
      border-radius: var(--radius);
    }

    .label {
      display: block;
      margin: 0 0 5px 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .section-bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(210px, 300px);
      gap: 12px;
      align-items: end;
      margin-bottom: 9px;
    }

    .section-bar h3 {
      font-size: 20px;
    }

    .subjects {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .subject {
      --subject-color: var(--accent);
      min-width: 0;
      padding: 10px;
      background: #fffdf8;
      border: 1px solid var(--line);
      border-top: 4px solid var(--subject-color);
      border-radius: var(--radius);
      box-shadow: var(--small-shadow);
    }

    .subject-head {
      gap: 8px;
      margin-bottom: 7px;
    }

    .dot,
    .task-dot {
      width: 12px;
      height: 12px;
      flex: 0 0 12px;
      border-radius: 99px;
      background: var(--subject-color);
      border: 1px solid rgba(47, 42, 36, 0.12);
    }

    .subject-name {
      flex: 1;
      min-width: 0;
      padding: 8px 6px;
      color: var(--ink);
      background: transparent;
      border: 0;
      border-radius: var(--radius);
      outline: none;
      font-size: 18px;
      font-weight: 900;
    }

    .subject-name:focus {
      background: #fff7ea;
      box-shadow: 0 0 0 2px rgba(95, 141, 117, 0.14);
    }

    .palette {
      gap: 6px;
      flex-wrap: wrap;
      margin: 7px 0 5px;
      padding: 7px;
      background: #fff8ed;
      border: 1px solid #eadbc5;
      border-radius: var(--radius);
    }

    .color-trigger {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 0 9px;
      color: var(--muted);
      background: #fff8ed;
      border: 1px solid #eadbc5;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .swatch {
      width: 30px;
      height: 30px;
      padding: 0;
      background: var(--swatch);
      border: 2px solid rgba(47, 42, 36, 0.12);
      border-radius: 999px;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.72) inset;
    }

    .swatch.active {
      border-color: #2f2a24;
      box-shadow: 0 0 0 3px rgba(47, 42, 36, 0.1);
    }

    .tasks,
    .daily {
      display: grid;
      gap: 8px;
      padding: 0;
      margin: 9px 0 0;
      list-style: none;
    }

    .daily {
      gap: 9px;
      margin-top: 14px;
    }

    .task {
      gap: 8px;
      min-width: 0;
      padding: 8px;
      background: #fff8ed;
      border: 1px solid #eadbc5;
      border-left: 5px solid var(--subject-color);
      border-radius: var(--radius);
    }

    .daily .task {
      background: rgba(255, 253, 248, 0.88);
      border-color: var(--theme-border);
      border-left-color: var(--subject-color);
    }

    .task.done {
      opacity: 0.68;
    }

    .task.done .textarea {
      color: var(--muted);
      text-decoration: line-through;
    }

    .check {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      cursor: pointer;
    }

    .check input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    .mark {
      width: 24px;
      height: 24px;
      background: #fffdf8;
      border: 2px solid #c6b8a4;
      border-radius: 7px;
    }

    .check input:checked + .mark {
      background: var(--subject-color);
      border-color: var(--subject-color);
    }

    .check input:checked + .mark::after {
      content: "";
      position: absolute;
      top: 7px;
      left: 9px;
      width: 6px;
      height: 11px;
      border: solid #2f2a24;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .task-main {
      flex: 1;
      min-width: 0;
    }

    .task-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .task-meta {
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .source {
      display: inline-flex;
      max-width: 100%;
      padding: 3px 7px;
      color: #5f4e3a;
      background: #efe0c8;
      border-radius: 999px;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .subject-select {
      width: auto;
      min-width: 130px;
      min-height: 32px;
      padding: 5px 26px 5px 9px;
      font-size: 12px;
      background-position:
        calc(100% - 14px) 14px,
        calc(100% - 9px) 14px;
    }

    .date-row,
    .daily-tools,
    .theme-row {
      gap: 6px;
      flex-wrap: wrap;
    }

    .date-row {
      justify-content: space-between;
      margin: 8px 0;
    }

    .date-row .input {
      width: auto;
      min-width: 176px;
    }

    .daily-tools {
      align-items: stretch;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 42px;
      padding: 0 12px;
      background: rgba(255, 253, 248, 0.72);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius);
      color: var(--ink);
      white-space: nowrap;
    }

    .toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--theme-accent);
    }

    .theme-row {
      padding: 3px;
      background: rgba(255, 253, 248, 0.52);
      border: 1px solid var(--theme-border);
      border-radius: var(--radius);
    }

    .theme-chip {
      min-height: 32px;
      padding: 0 9px;
      background: transparent;
      box-shadow: none;
      font-size: 14px;
    }

    .theme-chip.active {
      color: #fffdf8;
      background: var(--theme-accent);
      border-color: var(--theme-accent);
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      background: rgba(255, 250, 241, 0.74);
      border: 1px dashed #d9c7ac;
      border-radius: var(--radius);
      text-align: center;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 40;
      max-width: min(340px, calc(100vw - 36px));
      padding: 12px 14px;
      color: #fffdf8;
      background: rgba(47, 42, 36, 0.92);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1180px) {
      .subjects {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 860px) {
      .app {
        padding-top: 12px;
      }

      .decor-layer {
        grid-template-columns: repeat(5, minmax(54px, 1fr));
        gap: 16px;
        opacity: 0.22;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .title-line {
        grid-template-columns: 1fr;
      }

      .note-box {
        grid-template-columns: 1fr;
      }

      h1 {
        white-space: normal;
      }

      .motivation,
      .top-theme {
        width: 100%;
        max-width: none;
      }

      .top-theme {
        justify-content: stretch;
      }

      .theme-toggle {
        width: 100%;
        justify-content: center;
      }

      .actions {
        width: 100%;
        justify-content: stretch;
      }

      .actions > * {
        flex: 0 0 38px;
      }

      .mobile-tabs {
        display: flex;
        position: sticky;
        top: 154px;
        z-index: 18;
      }

      .board {
        display: block;
      }

      .panel {
        display: none;
      }

      .board[data-view="macro"] .macro-panel,
      .board[data-view="today"] .today-panel {
        display: block;
      }

      .today-panel {
        position: static;
        max-height: none;
      }

      .form-line,
      .period-edit,
      .section-bar,
      .daily-add {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .task {
        align-items: flex-start;
      }

      .task-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .copy,
      .postpone,
      .task-actions .mini {
        width: 100%;
      }

      .metric {
        flex-basis: 100%;
      }

      .daily-tools > *,
      .date-row .input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="decor-layer" id="decorLayer" aria-hidden="true"></div>
  <div class="app">
    <header class="topbar">
      <div class="title-block">
        <p class="eyebrow">Study Board</p>
        <div class="title-line">
          <h1>공부 계획판</h1>
          <div class="note-box">
            <select class="select note-mode" data-action="note-mode" aria-label="상단 입력 종류">
              <option value="quote">오늘의 한마디</option>
              <option value="music">음악</option>
            </select>
            <div class="note-input-wrap">
              <span class="note-icon" id="noteIcon" hidden aria-hidden="true">♪</span>
              <input class="motivation" data-edit="motivation" autocomplete="off" placeholder="오늘의 한마디를 적어보세요">
            </div>
          </div>
          <div class="top-theme" id="topTheme"></div>
        </div>
      </div>
      <div class="actions">
        <button class="button icon-button" type="button" data-action="export" title="백업" aria-label="백업">↓</button>
        <label class="file-button icon-button" for="restoreFile" title="복원" aria-label="복원">↑</label>
        <input class="sr-only" id="restoreFile" type="file" accept="application/json" data-action="restore">
      </div>
    </header>

    <nav class="mobile-tabs" aria-label="화면 전환">
      <button class="tab" type="button" data-action="view" data-view="macro">큰 계획</button>
      <button class="tab" type="button" data-action="view" data-view="today">오늘 계획</button>
    </nav>

    <main class="board" id="board" data-view="macro">
      <section class="panel macro-panel" id="macroPanel" aria-label="큰 계획"></section>
      <aside class="panel today-panel" id="todayPanel" aria-label="오늘 계획"></aside>
    </main>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script>
    (() => {
      "use strict";

      const KEY = "study-board-safari-v1";
      const MISC = "misc";
      const COLORS = [
        { id: "pastelRed", label: "빨강", value: "#f3a6a6" },
        { id: "pastelOrange", label: "주황", value: "#ffc58f" },
        { id: "pastelYellow", label: "노랑", value: "#f3df7c" },
        { id: "pastelGreen", label: "초록", value: "#a8d8b9" },
        { id: "pastelSky", label: "하늘", value: "#9ed9ea" },
        { id: "pastelBlue", label: "파랑", value: "#a8c4f5" },
        { id: "pastelPurple", label: "보라", value: "#c9b6f2" },
        { id: "pastelPink", label: "연핑크", value: "#f6bfd8" }
      ];
      const THEMES = [
        { id: "calm", emoji: "☕", label: "차분" },
        { id: "hard", emoji: "🔥", label: "빡공" },
        { id: "nice", emoji: "🌻", label: "느좋" },
        { id: "exam", emoji: "📝", label: "시험" }
      ];
      const TOP_EMOJIS = [
        { emoji: "🐶", bg: "#f6dfb9", strong: "#e6bc78", ink: "#9a6a2d" },
        { emoji: "🐱", bg: "#f6d8c6", strong: "#e8a987", ink: "#95593f" },
        { emoji: "🌿", bg: "#dcefd4", strong: "#a9d39f", ink: "#40764a" },
        { emoji: "💙", bg: "#dcecff", strong: "#a8c9f2", ink: "#3e72ad" },
        { emoji: "🤍", bg: "#f3f0ea", strong: "#d9d3c8", ink: "#7f776a" },
        { emoji: "🔥", bg: "#ffe0cf", strong: "#f3a579", ink: "#c65e35" },
        { emoji: "🌍", bg: "#d9ece5", strong: "#9fcbbd", ink: "#3f7d73" },
        { emoji: "☕", bg: "#ead9c2", strong: "#c9a67d", ink: "#7a5835" },
        { emoji: "🌙", bg: "#e5e2fa", strong: "#bab1eb", ink: "#5e5c9b" },
        { emoji: "✨", bg: "#fff0b8", strong: "#ecd276", ink: "#a27c1d" }
      ];
      const LEGACY_COLOR_MAP = {
        green: "pastelGreen",
        sage: "pastelGreen",
        red: "pastelRed",
        rose: "pastelRed",
        blue: "pastelBlue",
        sky: "pastelSky",
        gold: "pastelYellow",
        honey: "pastelYellow",
        clay: "pastelOrange",
        pink: "pastelPink",
        purple: "pastelPurple"
      };

      const macroPanel = document.querySelector("#macroPanel");
      const todayPanel = document.querySelector("#todayPanel");
      const board = document.querySelector("#board");
      const topbar = document.querySelector(".topbar");
      const toast = document.querySelector("#toast");
      const motivationInput = document.querySelector("[data-edit='motivation']");
      const noteModeSelect = document.querySelector("[data-action='note-mode']");
      const noteIcon = document.querySelector("#noteIcon");
      const topTheme = document.querySelector("#topTheme");
      const decorLayer = document.querySelector("#decorLayer");
      let toastTimer = 0;
      let openPaletteSubjectId = "";
      let topThemeOpen = false;
      let state = load();

      function id(prefix) {
        return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
      }

      function todayISO() {
        const now = new Date();
        const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
        return local.toISOString().slice(0, 10);
      }

      function addDays(value, amount) {
        const [year, month, day] = value.split("-").map(Number);
        const date = new Date(year, month - 1, day + amount);
        const local = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
        return local.toISOString().slice(0, 10);
      }

      function makeTask(text, options = {}) {
        return {
          id: id("task"),
          text,
          done: Boolean(options.done),
          source: options.source || null,
          legacyColor: normalizeColor(options.legacyColor),
          createdAt: Number.isFinite(options.createdAt) ? options.createdAt : Date.now()
        };
      }

      function sampleState() {
        const today = todayISO();
        const korean = { id: id("subject"), name: "국어", color: "pastelRed", tasks: [makeTask("문학 기출 20지문 복습"), makeTask("비문학 오답 선지 정리")] };
        const math = { id: id("subject"), name: "수학", color: "pastelGreen", tasks: [makeTask("수열 유형 30문제"), makeTask("미적분 약점 노트 보완")] };
        const english = { id: id("subject"), name: "영어", color: "pastelBlue", tasks: [makeTask("빈칸 추론 2회분"), makeTask("단어장 누적 복습")] };
        const p1 = {
          id: id("period"),
          title: "7월 계획",
          note: "기본기와 약점 정리",
          subjects: [korean, math, english]
        };
        const p2 = {
          id: id("period"),
          title: "9평 전 계획",
          note: "실전 감각 만들기",
          subjects: [
            { id: id("subject"), name: "탐구", color: "pastelYellow", tasks: [makeTask("개념 빈칸 점검"), makeTask("실전 모의고사 3회")] }
          ]
        };
        return {
          version: 3,
          view: "macro",
          date: today,
          selectedPeriodId: p1.id,
          motivation: "",
          noteMode: "quote",
          topEmoji: "🌿",
          hideDone: false,
          periods: [p1, p2],
          daily: {
            [today]: {
              theme: "calm",
              tasks: [
                makeTask("오전 영어 단어 40개", { source: sourceFromSubject(p1, english) }),
                makeTask("저녁 오답노트 정리", { source: sourceFromSubject(p1, math) })
              ]
            }
          }
        };
      }

      function load() {
        const raw = localStorage.getItem(KEY);
        if (!raw) return sampleState();
        try {
          const next = normalize(JSON.parse(raw));
          migrateDailySubjects(next);
          return next;
        } catch (error) {
          console.warn(error);
          return sampleState();
        }
      }

      function normalize(data) {
        const next = {
          version: 3,
          view: data && (data.view === "today" || data.selectedView === "today") ? "today" : "macro",
          date: isDate(data && (data.date || data.selectedDate)) ? (data.date || data.selectedDate) : todayISO(),
          selectedPeriodId: typeof (data && data.selectedPeriodId) === "string" ? data.selectedPeriodId : null,
          motivation: clean(data && data.motivation),
          noteMode: data && data.noteMode === "music" ? "music" : "quote",
          topEmoji: normalizeTopEmoji(data && data.topEmoji),
          hideDone: Boolean(data && data.hideDone),
          periods: Array.isArray(data && data.periods) ? data.periods.map(normalizePeriod).filter(Boolean) : [],
          daily: {}
        };
        const dailySource = data && (data.daily || data.dailyPlans);
        if (dailySource && typeof dailySource === "object") {
          Object.entries(dailySource).forEach(([date, plan]) => {
            if (!isDate(date)) return;
            next.daily[date] = normalizeDailyPlan(plan);
          });
        }
        if (!next.periods.some((period) => period.id === next.selectedPeriodId)) {
          next.selectedPeriodId = next.periods[0] ? next.periods[0].id : null;
        }
        if (!next.daily[next.date]) next.daily[next.date] = { theme: "calm", tasks: [] };
        return next;
      }

      function normalizePeriod(period) {
        if (!period || typeof period !== "object") return null;
        return {
          id: typeof period.id === "string" ? period.id : id("period"),
          title: clean(period.title) || "새 기간",
          note: clean(period.note),
          subjects: Array.isArray(period.subjects) ? period.subjects.map(normalizeSubject).filter(Boolean) : []
        };
      }

      function normalizeSubject(subject) {
        if (!subject || typeof subject !== "object") return null;
        return {
          id: typeof subject.id === "string" ? subject.id : id("subject"),
          name: clean(subject.name) || "새 과목",
          color: normalizeColor(subject.color || subject.tone) || COLORS[0].id,
          tasks: Array.isArray(subject.tasks) ? subject.tasks.map(normalizeTask).filter(Boolean) : []
        };
      }

      function normalizeDailyPlan(plan) {
        return {
          theme: normalizeTheme(plan && plan.theme),
          tasks: Array.isArray(plan && plan.tasks) ? plan.tasks.map(normalizeTask).filter(Boolean) : []
        };
      }

      function normalizeTask(item) {
        if (!item || typeof item !== "object") return null;
        const source = normalizeSource(item.source);
        return {
          id: typeof item.id === "string" ? item.id : id("task"),
          text: clean(item.text) || "새 할 일",
          done: Boolean(item.done),
          source: source.hasSource ? source.value : null,
          legacyColor: normalizeColor(item.color || item.subjectColor || source.subjectColor),
          createdAt: Number.isFinite(item.createdAt) ? item.createdAt : Date.now()
        };
      }

      function normalizeSource(source) {
        if (!source || typeof source !== "object") {
          return { hasSource: false, value: null, subjectColor: "" };
        }
        const value = {
          category: clean(source.category),
          periodId: clean(source.periodId),
          periodTitle: clean(source.periodTitle),
          subjectId: clean(source.subjectId),
          subjectName: clean(source.subjectName),
          originalTaskId: clean(source.originalTaskId || source.taskId),
          carriedFromDate: clean(source.carriedFromDate),
          originalDailyTaskId: clean(source.originalDailyTaskId),
          postponedFromDate: clean(source.postponedFromDate)
        };
        const hasSource = Object.values(value).some(Boolean);
        return { hasSource, value, subjectColor: normalizeColor(source.subjectColor) };
      }

      function migrateDailySubjects(next) {
        Object.values(next.daily).forEach((plan) => {
          plan.tasks.forEach((item) => {
            if (!item.source) item.source = { category: MISC };
            if (item.source.category === MISC) return;
            if (item.source.subjectId && findSubjectInState(next, item.source.subjectId)) return;
            if (item.source.originalTaskId) {
              const found = findMacroTaskInState(next, item.source.originalTaskId);
              if (found) {
                item.source = { ...item.source, ...sourceFromSubject(found.period, found.subject), originalTaskId: item.source.originalTaskId };
                return;
              }
            }
            if (item.legacyColor) {
              const match = firstSubjectByColor(next, item.legacyColor);
              if (match) {
                item.source = { ...item.source, ...sourceFromSubject(match.period, match.subject) };
                return;
              }
            }
            item.source.category = MISC;
          });
        });
      }

      function normalizeColor(value) {
        const mapped = LEGACY_COLOR_MAP[value] || value;
        return COLORS.some((color) => color.id === mapped) ? mapped : "";
      }

      function normalizeTheme(value) {
        return THEMES.some((theme) => theme.id === value) ? value : "calm";
      }

      function normalizeTopEmoji(value) {
        return TOP_EMOJIS.some((item) => item.emoji === value) ? value : "🌿";
      }

      function clean(value) {
        return typeof value === "string" ? value.trim() : "";
      }

      function isDate(value) {
        return typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value);
      }

      function save() {
        try {
          localStorage.setItem(KEY, JSON.stringify(state));
        } catch (error) {
          console.warn(error);
          showToast("저장 공간을 확인해 주세요.");
        }
      }

      function selectedPeriod() {
        return state.periods.find((period) => period.id === state.selectedPeriodId) || null;
      }

      function dailyPlan(date = state.date) {
        if (!state.daily[date]) state.daily[date] = { theme: "calm", tasks: [] };
        if (!state.daily[date].theme) state.daily[date].theme = "calm";
        if (!Array.isArray(state.daily[date].tasks)) state.daily[date].tasks = [];
        return state.daily[date];
      }

      function progress(tasks) {
        const total = tasks.length;
        const done = tasks.filter((item) => item.done).length;
        return { total, done, remaining: total - done, percent: total ? Math.round((done / total) * 100) : 0 };
      }

      function periodProgress(period) {
        return progress(period ? period.subjects.flatMap((subject) => subject.tasks) : []);
      }

      function allProgress() {
        return progress(state.periods.flatMap((period) => period.subjects.flatMap((subject) => subject.tasks)));
      }

      function colorValue(colorId) {
        const found = COLORS.find((color) => color.id === colorId);
        return found ? found.value : COLORS[0].value;
      }

      function currentTheme(plan = dailyPlan()) {
        return THEMES.find((theme) => theme.id === plan.theme) || THEMES[0];
      }

      function render() {
        const period = selectedPeriod();
        const plan = dailyPlan();
        board.dataset.view = state.view;
        todayPanel.dataset.theme = normalizeTheme(plan.theme);
        topbar.dataset.emoji = state.topEmoji;
        applyTopTheme();
        motivationInput.value = state.motivation;
        noteModeSelect.value = state.noteMode;
        noteIcon.hidden = state.noteMode !== "music";
        motivationInput.classList.toggle("has-icon", state.noteMode === "music");
        motivationInput.placeholder = state.noteMode === "music" ? "오늘 듣는 음악을 적어보세요" : "오늘의 한마디를 적어보세요";
        macroPanel.innerHTML = renderMacro(period);
        todayPanel.innerHTML = renderToday();
        topTheme.innerHTML = renderTopTheme();
        renderDecor();
        document.querySelectorAll("[data-action='view']").forEach((button) => {
          button.classList.toggle("active", button.dataset.view === state.view);
        });
        sizeTextareas();
      }

      function renderTopTheme() {
        return `
          <button class="theme-toggle is-themed" type="button" data-action="toggle-top-theme" aria-expanded="${topThemeOpen ? "true" : "false"}">
            <b>${state.topEmoji}</b>
            테마
          </button>
          ${topThemeOpen ? `
            <div class="emoji-popover" aria-label="상단 배경 테마">
              ${TOP_EMOJIS.map((item) => `
                <button class="emoji-choice ${state.topEmoji === item.emoji ? "active" : ""}" type="button" data-action="top-emoji" data-emoji="${item.emoji}" aria-label="${item.emoji} 테마">${item.emoji}</button>
              `).join("")}
            </div>
          ` : ""}
        `;
      }

      function renderDecor() {
        const count = 48;
        decorLayer.innerHTML = Array.from({ length: count }, () => `<span>${state.topEmoji}</span>`).join("");
      }

      function applyTopTheme() {
        const theme = TOP_EMOJIS.find((item) => item.emoji === state.topEmoji) || TOP_EMOJIS[2];
        document.documentElement.style.setProperty("--theme-bg", theme.bg);
        document.documentElement.style.setProperty("--theme-bg-strong", theme.strong);
        document.documentElement.style.setProperty("--theme-ink", theme.ink);
      }

      function renderMacro(period) {
        const whole = allProgress();
        const current = periodProgress(period);
        return `
          <div class="panel-head">
            <div class="panel-title">
              <div>
                <h2>큰 계획</h2>
                <p class="quiet">기간별 목표와 과목별 할 일을 따로 봅니다.</p>
              </div>
            </div>
            <div class="metrics">
              ${metric("전체 진행률", whole)}
              ${metric(period ? `${esc(period.title)} 진행률` : "기간 진행률", current)}
            </div>
            <form class="form-line" data-form="period">
              <input class="input" name="title" autocomplete="off" placeholder="새 기간 이름">
              <input class="input" name="note" autocomplete="off" placeholder="메모">
              <button class="primary" type="submit">기간 추가</button>
            </form>
          </div>
          ${renderPeriods()}
          ${period ? renderPeriod(period) : empty("기간이 비어 있어요.")}
        `;
      }

      function metric(label, item) {
        return `
          <div class="metric">
            <strong>${label}</strong>
            <div class="metric-line">
              <span class="percent">${item.percent}%</span>
              <span>${item.done}/${item.total} 완료</span>
            </div>
            <div class="bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${item.percent}">
              <span class="fill" style="--p:${item.percent}%"></span>
            </div>
          </div>
        `;
      }

      function renderPeriods() {
        if (!state.periods.length) return "";
        return `
          <div class="periods" aria-label="기간 목록">
            ${state.periods.map((period) => {
              const p = periodProgress(period);
              return `
                <button class="period ${period.id === state.selectedPeriodId ? "active" : ""}" type="button" data-action="select-period" data-period-id="${period.id}">
                  <b>${esc(period.title)}</b>
                  <span>${p.percent}% · ${p.done}/${p.total}</span>
                </button>
              `;
            }).join("")}
          </div>
        `;
      }

      function renderPeriod(period) {
        return `
          <div class="period-edit">
            <label>
              <span class="label">기간 이름</span>
              <input class="input" value="${attr(period.title)}" data-edit="period-title" data-period-id="${period.id}">
            </label>
            <label>
              <span class="label">메모</span>
              <input class="input" value="${attr(period.note)}" data-edit="period-note" data-period-id="${period.id}">
            </label>
            <button class="danger" type="button" data-action="delete-period" data-period-id="${period.id}">기간 삭제</button>
          </div>
          <div class="section-bar">
            <div>
              <h3>과목별 카드</h3>
              <p class="quiet">${period.subjects.length}개 과목</p>
            </div>
            <form class="mini-form" data-form="subject">
              <input class="input" name="name" autocomplete="off" placeholder="새 과목">
              <button class="primary" type="submit">추가</button>
            </form>
          </div>
          ${period.subjects.length ? `<div class="subjects">${period.subjects.map(renderSubject).join("")}</div>` : empty("과목 카드가 비어 있어요.")}
        `;
      }

      function renderSubject(subject) {
        const p = progress(subject.tasks);
        return `
          <article class="subject" style="--subject-color:${colorValue(subject.color)}">
            <header class="subject-head">
              <span class="dot" aria-hidden="true"></span>
              <input class="subject-name" value="${attr(subject.name)}" data-edit="subject-name" data-subject-id="${subject.id}" aria-label="과목 이름">
              <button class="color-trigger" type="button" data-action="toggle-palette" data-subject-id="${subject.id}">
                <span class="dot" aria-hidden="true"></span>
                색상
              </button>
              <button class="mini" type="button" data-action="delete-subject" data-subject-id="${subject.id}" aria-label="과목 삭제">삭제</button>
            </header>
            ${openPaletteSubjectId === subject.id ? `
              <div class="palette" aria-label="${esc(subject.name)} 색상 팔레트">
                ${COLORS.map((color) => `
                  <button class="swatch ${subject.color === color.id ? "active" : ""}" type="button" data-action="subject-color" data-subject-id="${subject.id}" data-color="${color.id}" style="--swatch:${color.value}" aria-label="${color.label}"></button>
                `).join("")}
              </div>
            ` : ""}
            <div class="metric-line">
              <span>${p.done}/${p.total} 완료</span>
              <span>${p.percent}%</span>
            </div>
            <div class="bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${p.percent}">
              <span class="fill" style="--p:${p.percent}%"></span>
            </div>
            ${subject.tasks.length ? `<ul class="tasks">${subject.tasks.map(renderMacroTask).join("")}</ul>` : empty("할 일이 비어 있어요.")}
            <form class="mini-form" data-form="macro-task" data-subject-id="${subject.id}">
              <input class="input" name="text" autocomplete="off" placeholder="할 일 추가">
              <button class="primary" type="submit">추가</button>
            </form>
          </article>
        `;
      }

      function renderMacroTask(item) {
        return `
          <li class="task ${item.done ? "done" : ""}">
            <label class="check" aria-label="완료 여부">
              <input type="checkbox" data-action="toggle-macro" data-task-id="${item.id}" ${item.done ? "checked" : ""}>
              <span class="mark"></span>
            </label>
            <div class="task-main">
              <textarea class="textarea" rows="1" data-edit="macro-text" data-task-id="${item.id}" aria-label="큰 계획 할 일">${esc(item.text)}</textarea>
            </div>
            <div class="task-actions">
              <button class="copy" type="button" data-action="copy-today" data-task-id="${item.id}">오늘 하기</button>
              <button class="mini" type="button" data-action="delete-macro" data-task-id="${item.id}" aria-label="할 일 삭제">삭제</button>
            </div>
          </li>
        `;
      }

      function renderToday() {
        const plan = dailyPlan();
        const p = progress(plan.tasks);
        const theme = currentTheme(plan);
        const visibleTasks = state.hideDone ? plan.tasks.filter((item) => !item.done) : plan.tasks;
        const hiddenCount = plan.tasks.length - visibleTasks.length;
        return `
          <div class="panel-head">
            <div class="panel-title">
              <div>
                <h2 class="today-heading"><span class="today-emoji">${theme.emoji}</span> 오늘 계획</h2>
                <p class="quiet">${dateLabel(state.date)}</p>
                <span class="remaining">남은 일 ${p.remaining}개</span>
              </div>
            </div>
            ${metric("일별 진행률", p)}
            <div class="theme-row" aria-label="오늘 계획 무드">
              ${THEMES.map((item) => `
                <button class="theme-chip ${item.id === plan.theme ? "active" : ""}" type="button" data-action="theme" data-theme="${item.id}">
                  ${item.emoji} ${item.label}
                </button>
              `).join("")}
            </div>
            <div class="date-row">
              <input class="input" type="date" value="${state.date}" data-action="date" aria-label="날짜 선택">
              <div class="daily-tools">
                <button class="button" type="button" data-action="today">오늘</button>
                <button class="button" type="button" data-action="import-yesterday">어제 못한 일</button>
                <label class="toggle">
                  <input type="checkbox" data-action="hide-done" ${state.hideDone ? "checked" : ""}>
                  완료 숨기기
                </label>
              </div>
            </div>
            <form class="mini-form daily-add" data-form="daily-task">
              <input class="input" name="text" autocomplete="off" placeholder="오늘 할 일">
              <select class="select" name="subject" aria-label="과목 선택">
                ${subjectOptions(MISC)}
              </select>
              <button class="primary" type="submit">추가</button>
            </form>
          </div>
          ${visibleTasks.length ? `<ul class="daily">${visibleTasks.map(renderDailyTask).join("")}</ul>` : empty(hiddenCount ? "완료한 일이 숨겨져 있어요." : "오늘 계획이 비어 있어요.")}
        `;
      }

      function renderDailyTask(item) {
        const subject = resolvedDailySubject(item);
        const color = subject.color;
        const source = dailySourceLabel(item, subject);
        return `
          <li class="task ${item.done ? "done" : ""}" style="--subject-color:${colorValue(color)}">
            <label class="check" aria-label="완료 여부">
              <input type="checkbox" data-action="toggle-daily" data-task-id="${item.id}" ${item.done ? "checked" : ""}>
              <span class="mark"></span>
            </label>
            <div class="task-main">
              <textarea class="textarea" rows="1" data-edit="daily-text" data-task-id="${item.id}" aria-label="일별 할 일">${esc(item.text)}</textarea>
              <div class="task-meta">
                <span class="task-dot" aria-hidden="true"></span>
                <span class="source">${esc(source)}</span>
                <select class="select subject-select" data-action="daily-subject" data-task-id="${item.id}" aria-label="오늘 할 일 과목">
                  ${subjectOptions(subject.value)}
                </select>
              </div>
            </div>
            <div class="task-actions">
              <button class="postpone" type="button" data-action="postpone" data-task-id="${item.id}">내일로 미루기</button>
              <button class="mini" type="button" data-action="delete-daily" data-task-id="${item.id}" aria-label="할 일 삭제">삭제</button>
            </div>
          </li>
        `;
      }

      function subjectOptions(selected) {
        const rows = [`<option value="${MISC}" ${selected === MISC ? "selected" : ""}>기타</option>`];
        subjectChoices().forEach((subject) => {
          rows.push(`<option value="${subject.value}" ${selected === subject.value ? "selected" : ""}>${esc(subject.name)}</option>`);
        });
        return rows.join("");
      }

      function empty(message) {
        return `<div class="empty">${message}</div>`;
      }

      function onSubmit(event) {
        const form = event.target.closest("form[data-form]");
        if (!form) return;
        event.preventDefault();

        if (form.dataset.form === "period") {
          const title = clean(form.elements.title.value);
          if (!title) return showToast("기간 이름을 입력해 주세요.");
          const period = { id: id("period"), title, note: clean(form.elements.note.value), subjects: [] };
          state.periods.push(period);
          state.selectedPeriodId = period.id;
          form.reset();
          commit("기간을 추가했어요.");
        }

        if (form.dataset.form === "subject") {
          const period = selectedPeriod();
          const name = clean(form.elements.name.value);
          if (!period || !name) return showToast("과목 이름을 입력해 주세요.");
          period.subjects.push({
            id: id("subject"),
            name,
            color: COLORS[period.subjects.length % COLORS.length].id,
            tasks: []
          });
          form.reset();
          commit("과목을 추가했어요.");
        }

        if (form.dataset.form === "macro-task") {
          const subject = findSubject(form.dataset.subjectId);
          const text = clean(form.elements.text.value);
          if (!subject || !text) return showToast("할 일을 입력해 주세요.");
          subject.tasks.push(makeTask(text));
          form.reset();
          commit("큰 계획에 추가했어요.");
        }

        if (form.dataset.form === "daily-task") {
          const text = clean(form.elements.text.value);
          if (!text) return showToast("할 일을 입력해 주세요.");
          dailyPlan().tasks.push(makeTask(text, { source: sourceFromSelection(form.elements.subject.value) }));
          form.reset();
          form.elements.subject.value = MISC;
          commit("일별 계획에 추가했어요.");
        }
      }

      function onClick(event) {
        const target = event.target.closest("[data-action]");
        if (!target) return;
        const action = target.dataset.action;

        if (action === "view") {
          state.view = target.dataset.view === "today" ? "today" : "macro";
          commit();
        }

        if (action === "select-period") {
          state.selectedPeriodId = target.dataset.periodId;
          commit();
        }

        if (action === "today") {
          state.date = todayISO();
          dailyPlan();
          commit();
        }

        if (action === "theme") setDailyTheme(target.dataset.theme);
        if (action === "toggle-top-theme") toggleTopTheme();
        if (action === "top-emoji") setTopEmoji(target.dataset.emoji);
        if (action === "toggle-palette") togglePalette(target.dataset.subjectId);
        if (action === "subject-color") setSubjectColor(target.dataset.subjectId, target.dataset.color);
        if (action === "copy-today") copyToToday(target.dataset.taskId);
        if (action === "postpone") postponeDailyTask(target.dataset.taskId);
        if (action === "import-yesterday") importYesterdayUndone();
        if (action === "delete-period") deletePeriod(target.dataset.periodId);
        if (action === "delete-subject") deleteSubject(target.dataset.subjectId);
        if (action === "delete-macro") deleteMacroTask(target.dataset.taskId);
        if (action === "delete-daily") deleteDailyTask(target.dataset.taskId);
        if (action === "export") exportBackup();
      }

      function onChange(event) {
        const target = event.target;
        const action = target.dataset.action;

        if (action === "toggle-macro") {
          const found = findMacroTask(target.dataset.taskId);
          if (!found) return;
          found.task.done = target.checked;
          commit();
        }

        if (action === "toggle-daily") {
          const found = findDailyTask(target.dataset.taskId);
          if (!found) return;
          found.done = target.checked;
          commit();
        }

        if (action === "date") {
          state.date = isDate(target.value) ? target.value : todayISO();
          dailyPlan();
          commit();
        }

        if (action === "hide-done") {
          state.hideDone = target.checked;
          commit(target.checked ? "완료한 일을 숨겼어요." : "완료한 일을 다시 보여줘요.");
        }

        if (action === "note-mode") {
          state.noteMode = target.value === "music" ? "music" : "quote";
          commit(state.noteMode === "music" ? "음악 입력으로 바꿨어요." : "오늘의 한마디로 바꿨어요.");
        }

        if (action === "daily-subject") {
          const task = findDailyTask(target.dataset.taskId);
          if (!task) return;
          task.source = sourceFromSelection(target.value);
          commit("오늘 할 일 과목을 바꿨어요.");
        }

        if (action === "restore") {
          restoreBackup(target.files && target.files[0]);
          target.value = "";
        }
      }

      function onInput(event) {
        const target = event.target;
        const edit = target.dataset.edit;
        if (!edit) return;

        if (edit === "motivation") {
          state.motivation = clean(target.value);
          save();
          return;
        }

        if (edit === "period-title" || edit === "period-note") {
          const period = state.periods.find((item) => item.id === target.dataset.periodId);
          if (!period) return;
          period[edit === "period-title" ? "title" : "note"] = clean(target.value);
        }

        if (edit === "subject-name") {
          const subject = findSubject(target.dataset.subjectId);
          if (!subject) return;
          subject.name = clean(target.value) || "새 과목";
        }

        if (edit === "macro-text") {
          const found = findMacroTask(target.dataset.taskId);
          if (!found) return;
          found.task.text = clean(target.value) || "새 할 일";
          sizeTextarea(target);
        }

        if (edit === "daily-text") {
          const found = findDailyTask(target.dataset.taskId);
          if (!found) return;
          found.text = clean(target.value) || "새 할 일";
          sizeTextarea(target);
        }

        save();
      }

      function onBlur(event) {
        if (event.target.dataset.edit && event.target.dataset.edit !== "motivation") render();
      }

      function findSubject(subjectId) {
        return findSubjectInState(state, subjectId);
      }

      function findSubjectInState(targetState, subjectId) {
        for (const period of targetState.periods) {
          const found = period.subjects.find((subject) => subject.id === subjectId);
          if (found) return found;
        }
        return null;
      }

      function findSubjectWithPeriod(subjectId) {
        for (const period of state.periods) {
          const subject = period.subjects.find((item) => item.id === subjectId);
          if (subject) return { period, subject };
        }
        return null;
      }

      function findMacroTask(taskId) {
        return findMacroTaskInState(state, taskId);
      }

      function findMacroTaskInState(targetState, taskId) {
        for (const period of targetState.periods) {
          for (const subject of period.subjects) {
            const found = subject.tasks.find((item) => item.id === taskId);
            if (found) return { period, subject, task: found };
          }
        }
        return null;
      }

      function firstSubjectByColor(targetState, color) {
        for (const period of targetState.periods) {
          const subject = period.subjects.find((item) => item.color === color);
          if (subject) return { period, subject };
        }
        return null;
      }

      function subjectNameKey(name) {
        return clean(name).toLocaleLowerCase("ko-KR");
      }

      function subjectValue(name) {
        return `name:${encodeURIComponent(clean(name))}`;
      }

      function subjectNameFromValue(value) {
        const raw = clean(value);
        if (raw.startsWith("name:")) return decodeURIComponent(raw.slice(5));
        if (raw.startsWith("subject:")) {
          const found = findSubjectWithPeriod(raw.slice(8));
          return found ? found.subject.name : "";
        }
        return "";
      }

      function subjectChoices() {
        const seen = new Set();
        const choices = [];
        state.periods.forEach((period) => {
          period.subjects.forEach((subject) => {
            const key = subjectNameKey(subject.name);
            if (!key || seen.has(key)) return;
            seen.add(key);
            choices.push({ name: subject.name, value: subjectValue(subject.name) });
          });
        });
        return choices;
      }

      function firstSubjectByName(name) {
        const key = subjectNameKey(name);
        if (!key) return null;
        for (const period of state.periods) {
          const subject = period.subjects.find((item) => subjectNameKey(item.name) === key);
          if (subject) return { period, subject };
        }
        return null;
      }

      function findDailyTask(taskId, date = state.date) {
        return dailyPlan(date).tasks.find((item) => item.id === taskId) || null;
      }

      function sourceFromSubject(period, subject) {
        return {
          category: "subject",
          periodId: period.id,
          periodTitle: period.title,
          subjectId: subject.id,
          subjectName: subject.name
        };
      }

      function sourceFromSelection(value) {
        if (value === MISC) return { category: MISC };
        const subjectName = subjectNameFromValue(value);
        const found = firstSubjectByName(subjectName);
        if (!found) return { category: MISC };
        return sourceFromSubject(found.period, found.subject);
      }

      function togglePalette(subjectId) {
        openPaletteSubjectId = openPaletteSubjectId === subjectId ? "" : subjectId;
        render();
      }

      function setSubjectColor(subjectId, colorId) {
        const subject = findSubject(subjectId);
        const color = normalizeColor(colorId);
        if (!subject || !color) return;
        const key = subjectNameKey(subject.name);
        state.periods.forEach((period) => {
          period.subjects.forEach((item) => {
            if (subjectNameKey(item.name) === key) item.color = color;
          });
        });
        openPaletteSubjectId = "";
        commit("과목 색상을 바꿨어요.");
      }

      function copyToToday(taskId) {
        const found = findMacroTask(taskId);
        if (!found) return;
        const today = todayISO();
        state.date = today;
        dailyPlan(today).tasks.push(makeTask(found.task.text, {
          source: {
            ...sourceFromSubject(found.period, found.subject),
            originalTaskId: found.task.id
          }
        }));
        if (window.matchMedia("(max-width: 860px)").matches) state.view = "today";
        commit("오늘 계획으로 복사했어요.");
      }

      function postponeDailyTask(taskId) {
        const plan = dailyPlan();
        const index = plan.tasks.findIndex((item) => item.id === taskId);
        if (index < 0) return;
        const [item] = plan.tasks.splice(index, 1);
        const tomorrow = addDays(state.date, 1);
        const tomorrowPlan = dailyPlan(tomorrow);
        item.source = {
          ...(item.source || { category: MISC }),
          postponedFromDate: state.date
        };
        tomorrowPlan.tasks.push(item);
        commit("내일 계획으로 옮겼어요.");
      }

      function importYesterdayUndone() {
        const yesterday = addDays(state.date, -1);
        const fromPlan = dailyPlan(yesterday);
        const targetPlan = dailyPlan(state.date);
        const undone = fromPlan.tasks.filter((item) => !item.done);
        let added = 0;
        undone.forEach((item) => {
          const alreadyImported = targetPlan.tasks.some((target) =>
            target.source &&
            target.source.carriedFromDate === yesterday &&
            target.source.originalDailyTaskId === item.id
          );
          if (alreadyImported) return;
          targetPlan.tasks.push(makeTask(item.text, {
            done: false,
            source: {
              ...(item.source || { category: MISC }),
              carriedFromDate: yesterday,
              originalDailyTaskId: item.id
            }
          }));
          added += 1;
        });
        if (!added) {
          showToast("가져올 어제 미완료 일이 없어요.");
          return;
        }
        commit(`어제 못한 일 ${added}개를 가져왔어요.`);
      }

      function setDailyTheme(themeId) {
        dailyPlan().theme = normalizeTheme(themeId);
        commit("오늘 계획 무드를 바꿨어요.");
      }

      function toggleTopTheme() {
        topThemeOpen = !topThemeOpen;
        render();
      }

      function setTopEmoji(emoji) {
        state.topEmoji = normalizeTopEmoji(emoji);
        topThemeOpen = false;
        commit("상단 테마를 바꿨어요.");
      }

      function deletePeriod(periodId) {
        const period = state.periods.find((item) => item.id === periodId);
        if (!period || !confirm(`"${period.title}" 기간을 삭제할까요?`)) return;
        state.periods = state.periods.filter((item) => item.id !== periodId);
        state.selectedPeriodId = state.periods[0] ? state.periods[0].id : null;
        commit("기간을 삭제했어요.");
      }

      function deleteSubject(subjectId) {
        const period = selectedPeriod();
        if (!period) return;
        const subject = period.subjects.find((item) => item.id === subjectId);
        if (!subject || !confirm(`"${subject.name}" 과목을 삭제할까요?`)) return;
        period.subjects = period.subjects.filter((item) => item.id !== subjectId);
        Object.values(state.daily).forEach((plan) => {
          plan.tasks.forEach((item) => {
            if (item.source && item.source.subjectId === subjectId) {
              item.source = { category: MISC };
            }
          });
        });
        commit("과목을 삭제했어요.");
      }

      function deleteMacroTask(taskId) {
        const found = findMacroTask(taskId);
        if (!found) return;
        found.subject.tasks = found.subject.tasks.filter((item) => item.id !== taskId);
        commit("큰 계획에서 삭제했어요.");
      }

      function deleteDailyTask(taskId) {
        const plan = dailyPlan();
        plan.tasks = plan.tasks.filter((item) => item.id !== taskId);
        commit("일별 계획에서 삭제했어요.");
      }

      function resolvedDailySubject(item) {
        if (!item.source || item.source.category === MISC) {
          return { value: MISC, name: "기타", color: "misc", periodTitle: "" };
        }
        if (item.source.subjectName) {
          const byName = firstSubjectByName(item.source.subjectName);
          if (byName) {
            return {
              value: subjectValue(byName.subject.name),
              name: byName.subject.name,
              color: byName.subject.color,
              periodTitle: ""
            };
          }
        }
        if (item.source.subjectId) {
          const found = findSubjectWithPeriod(item.source.subjectId);
          if (found) {
            return {
              value: subjectValue(found.subject.name),
              name: found.subject.name,
              color: found.subject.color,
              periodTitle: ""
            };
          }
        }
        return { value: MISC, name: "기타", color: "misc", periodTitle: "" };
      }

      function dailySourceLabel(item, subject) {
        const parts = [];
        if (subject.value === MISC) {
          parts.push("기타");
        } else {
          parts.push(subject.name);
        }
        if (item.source && item.source.carriedFromDate) parts.push(`${shortDate(item.source.carriedFromDate)}에서 가져옴`);
        if (item.source && item.source.postponedFromDate) parts.push(`${shortDate(item.source.postponedFromDate)}에서 미룸`);
        return parts.filter(Boolean).join(" · ");
      }

      function colorValue(colorId) {
        if (colorId === "misc") return getComputedStyle(document.documentElement).getPropertyValue("--misc").trim() || "#d6d1c7";
        const found = COLORS.find((color) => color.id === colorId);
        return found ? found.value : COLORS[0].value;
      }

      function exportBackup() {
        const blob = new Blob([JSON.stringify({ ...state, exportedAt: new Date().toISOString() }, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = `study-board-backup-${todayISO()}.json`;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
        showToast("백업 파일을 만들었어요.");
      }

      function restoreBackup(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const restored = normalize(JSON.parse(String(reader.result || "{}")));
            migrateDailySubjects(restored);
            if (!confirm("현재 계획을 복원 파일로 바꿀까요?")) return;
            state = restored;
            commit("복원했어요.");
          } catch (error) {
            console.warn(error);
            showToast("복원 파일을 확인해 주세요.");
          }
        };
        reader.readAsText(file);
      }

      function commit(message) {
        save();
        render();
        if (message) showToast(message);
      }

      function showToast(message) {
        clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add("show");
        toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
      }

      function dateLabel(value) {
        const [year, month, day] = value.split("-").map(Number);
        const date = new Date(year, month - 1, day);
        return new Intl.DateTimeFormat("ko-KR", {
          month: "long",
          day: "numeric",
          weekday: "long"
        }).format(date);
      }

      function shortDate(value) {
        const [year, month, day] = value.split("-").map(Number);
        const date = new Date(year, month - 1, day);
        return new Intl.DateTimeFormat("ko-KR", {
          month: "numeric",
          day: "numeric"
        }).format(date);
      }

      function sizeTextareas() {
        document.querySelectorAll("textarea").forEach(sizeTextarea);
      }

      function sizeTextarea(textarea) {
        textarea.style.height = "auto";
        textarea.style.height = `${textarea.scrollHeight}px`;
      }

      function esc(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function attr(value) {
        return esc(value).replaceAll("`", "&#096;");
      }

      document.addEventListener("submit", onSubmit);
      document.addEventListener("click", onClick);
      document.addEventListener("change", onChange);
      document.addEventListener("input", onInput);
      document.addEventListener("blur", onBlur, true);
      window.addEventListener("resize", sizeTextareas);

      render();
    })();
  </script>
</body>
</html>
